# Order Service Pipeline — Java Spring Boot with Maven
# Calls reusable build + deploy workflows

name: Order Service CI/CD

on:
  push:
    branches: [main, dev, staging]
    paths:
      - "services/order-service/**"
      - ".github/workflows/order-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/order-service/**"

env:
  SERVICE_NAME: order-service

jobs:
  # ── Build & Push ─────────────────────────────────────────────────
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      service-name: order-service
      dockerfile-path: services/order-service/Dockerfile
      context-path: services/order-service
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_NAME: ${{ secrets.ACR_NAME }}

  # ── Deploy to Dev ────────────────────────────────────────────────
  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      service-name: order-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      environment: dev
      namespace: shopflow-dev
    secrets: inherit

  # ── Deploy to Staging ────────────────────────────────────────────
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/staging'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      service-name: order-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      environment: staging
      namespace: shopflow-staging
    secrets: inherit

  # ── Deploy to Production (requires approval) ─────────────────────
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production        # <-- Required reviewers set here
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      service-name: order-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      environment: prod
      namespace: shopflow-prod
    secrets: inherit
